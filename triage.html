<!DOCTYPE html>
<html>
<head>
  <title>Triage</title>
  <style>
    body{
      font-family:Segoe UI;
      background:#f4f7fb;
      padding:20px;
    }

    table{
      width:100%;
      background:white;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 5px 20px rgba(0,0,0,0.08);
    }

    th, td{
      padding:12px;
      text-align:left;
    }

    th{
      background:#7AB2B2;
      color:white;
    }

    input[type="text"]{
      width:120px;
      padding:6px;
    }

    input[type="file"]{
      width:180px;
    }

    button{
      padding:8px 12px;
      background:#7AB2B2;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }


    .history-box{
  width:100%;
  min-height:44px;
  padding:10px;
  border:1px solid #d1d5db;
  border-radius:8px;
  box-sizing:border-box;
  resize:vertical;
  overflow:hidden;
  line-height:1.5;
}

.history-box:focus{
  min-height:100px;
  background:#f9fafb;
}
  </style>
</head>
<body>

<h2>Triage</h2>
<button type="button" onclick="logout()" style="width:auto; padding:10px 18px; margin-bottom:16px;">Logout</button>
<table id="table">
  <thead>
<tr>
  <th>Name</th>
  <th>Gender</th>
  <th>ID Number</th>
  <th>Age</th>
  <th>Doctor</th>
  <th>VA</th>
  <th>Complaint / History</th>
  <th>Action</th>
</tr>
  </thead>
  <tbody></tbody>
</table>

<script>
function logout() {
  localStorage.removeItem("userRole");
  localStorage.removeItem("userName");
  localStorage.removeItem("username");
  window.location.href = "login.html";
}

const userRole = localStorage.getItem("userRole");
const userName = localStorage.getItem("userName");

if (userRole !== "triage") {
  window.location.href = "login.html";
}

const URL = "https://script.google.com/macros/s/AKfycbzkvYNe-y6Ir5Ncfldk5mdtj9ealfZXae9rJPAIHbBeX5J94XsKBaNME31I_peXgXjzeQ/exec";

function isToday(dateString){
  const today = new Date();
  const d = new Date(dateString);

  return d.getDate() === today.getDate() &&
         d.getMonth() === today.getMonth() &&
         d.getFullYear() === today.getFullYear();
}

async function loadPatients(){
  try {
    const res = await fetch(URL);
    const data = await res.json();

    const tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    const filtered = data.filter(p =>
      (p["Status"] || "") === "Reception" &&
      p["Timestamp"] &&
      isToday(p["Timestamp"])
    );

    filtered.forEach(p => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${p["Patient Name"] || ""}</td>
        <td>${p["Gender"] || ""}</td>
        <td>${p["ID Number"] || ""}</td>
        <td>${p["Age"] || ""}</td>
        <td>${p["Doctor Name"] || ""}</td>
        <td><input type="text" id="va-${p.rowIndex}"></td>
        <td><textarea id="ar-${p.rowIndex}" class="history-box"></textarea></td>
        <td><button id="btn-${p.rowIndex}" onclick="save(${p.rowIndex})">Save</button></td>
      `;

      tbody.appendChild(tr);
    });

  } catch (error) {
    console.error(error);
    alert("Failed to load patients");
  }
}

document.addEventListener("input", function(e){
  if(e.target.classList.contains("history-box") || e.target.classList.contains("plan-box")){
    e.target.style.height = "auto";
    e.target.style.height = e.target.scrollHeight + "px";
  }
});

async function save(rowIndex){
  try {
    const btn = document.getElementById(`btn-${rowIndex}`);
    const va = document.getElementById(`va-${rowIndex}`).value;
    const ar = document.getElementById(`ar-${rowIndex}`).value;

    btn.innerText = "Saving...";
    btn.disabled = true;
    btn.style.background = "#9ca3af";

    const res = await fetch(URL, {
      method:"POST",
      body: JSON.stringify({
        action:"update",
        rowIndex: rowIndex,
        va: va,
        ar: ar,
        triageUser: localStorage.getItem("userName") || ""
      })
    });

    const result = await res.json();

    if (result.result === "updated") {
      btn.innerText = "Saved ✓";
      btn.style.background = "#16a34a";

      setTimeout(() => {
        loadPatients();
      }, 500);
    } else {
      throw new Error(result.message || "Unknown error");
    }

  } catch (error) {
    console.error(error);

    const btn = document.getElementById(`btn-${rowIndex}`);
    btn.innerText = "Error";
    btn.style.background = "#dc2626";
    btn.disabled = false;
  }
}

loadPatients();
</script>

</body>
</html>
