<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reception</title>
  <style>
    body{
      font-family: Segoe UI, Arial, sans-serif;
      background:#f4f7fb;
      margin:0;
      padding:30px;
    }

    .container{
      max-width:900px;
      margin:auto;
      background:#fff;
      padding:30px;
      border-radius:16px;
      box-shadow:0 8px 25px rgba(0,0,0,0.08);
    }

    h1{
      margin-top:0;
      text-align:center;
      color:#1f2937;
      font-size:32px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .full{
      grid-column:1 / -1;
    }

    .name-gender{
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:18px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-weight:600;
      color:#374151;
      font-size:15px;
    }

    input, select{
      width:100%;
      padding:14px;
      border:1px solid #d1d5db;
      border-radius:12px;
      font-size:16px;
      box-sizing:border-box;
      background:#fff;
    }

    button{
      width:100%;
      border:none;
      padding:16px;
      border-radius:14px;
      background:#7AB2B2;
      color:white;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
      margin-top:20px;
    }

    button:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    .msg{
      margin-top:16px;
      text-align:center;
      font-weight:600;
      min-height:24px;
    }

    .error-border{
      border:2px solid #dc2626 !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Reception Registration</h1>
<button type="button" onclick="logout()" style="width:auto; padding:10px 18px; margin-bottom:16px;">Logout</button>
    <div class="grid">
      <div class="full">
        <div class="name-gender">
          <div>
            <label>Patient Name</label>
            <input type="text" id="patientName" />
          </div>
          <div>
            <label>Gender</label>
            <select id="gender">
              <option value="">Select</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
        </div>
      </div>

      <div>
        <label>Age</label>
        <input type="number" id="age" />
      </div>

      <div>
        <label>ID Number</label>
        <input type="text" id="idNumber" />
      </div>

      <div>
        <label>Mobile Number</label>
        <input type="text" id="mobileNumber" />
      </div>

      <div>
  <label>Payment Type</label>
  <select id="paymentType">
    <option value="">Select</option>
    <option value="Cash">Cash</option>
    <option value="Insurance">Insurance</option>
  </select>
</div>

<div>
  <label>Payment Method</label>
  <select id="paymentMethod">
    <option value="">Select</option>
    <option value="Cash">Cash</option>
    <option value="Card">Card</option>
    <option value="Fullowup">Fullowup</option>

  </select>
</div>

<div>
  <label>Amount</label>
  <input type="number" id="amount" />
</div>
      

      <div>
        <label>Nationality</label>
        <select id="nationality">
          <option value="">Select Nationality</option>
          <option value="Saudi">Saudi</option>
          <option value="Egyptian">Egyptian</option>
          <option value="Yemeni">Yemeni</option>
          <option value="Sudanese">Sudanese</option>
          <option value="Filipino">Filipino</option>
          <option value="Pakistani">Pakistani</option>
          <option value="Indian">Indian</option>
          <option value="Bengali">Bengali</option>
          <option value="Nepali">Nepali</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="full">
        <label>Doctor Name</label>
        <select id="doctorName">
          <option value="">Select Doctor</option>
          <option>MUATH ALRUSHOOD</option>
          <option>ABDULRAHMAN ALGHADYAN</option>
          <option>ELHAM AL TAMIMI</option>
          <option>QUSAI MOHAMMED</option>
          <option>MOFI ALWALMANY</option>
          <option>SANA YASSIN</option>
          <option>AHMED EZZAT</option>
          <option>WAQAR MUSTAFA</option>
          <option>NAJAR MOHAMMAED</option>
          <option>RAYAN MOHAMEED</option>
          <option>SARA MUSTAFA</option>
          <option>DALLAL MOHAMMAD</option>
          <option>Jeseena Jamaludin</option>
          <option>THURAYA</option>
          <option>SUSHMITHA ARCOT</option>
        </select>
      </div>
    </div>

    <button id="saveBtn" onclick="submitForm()">Save Patient</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    function logout() {
  localStorage.removeItem("userRole");
  localStorage.removeItem("userName");
  localStorage.removeItem("username");
  window.location.href = "login.html";
}
    const userRole = localStorage.getItem("userRole");
const userName = localStorage.getItem("userName");

if (userRole !== "reception") {
  window.location.href = "login.html";
}
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxtkrTGqSjtMT4OhHqAg5LPu9CypFdHT8Jg2pLt6UXnkIn722KtZ83P4hQp1-Hcpik9lw/exec";
let lastInvoiceData = null;

    function clearErrors() {
      document.querySelectorAll("input, select").forEach(el => el.classList.remove("error-border"));
    }

    function markError(id) {
      document.getElementById(id).classList.add("error-border");
    }

    function validateForm(data) {
      clearErrors();

      const requiredFields = [
  "patientName",
  "gender",
  "age",
  "idNumber",
  "mobileNumber",
  "paymentType",
  "paymentMethod",
  "amount",
  "nationality",
  "doctorName"
];

      let hasError = false;

      requiredFields.forEach(id => {
        const el = document.getElementById(id);
        if (!String(el.value).trim()) {
          el.classList.add("error-border");
          hasError = true;
        }
      });

      if (hasError) {
        return "Please fill all required fields.";
      }

      // Mobile: 05 + 8 digits
      if (!/^05\d{8}$/.test(data.mobileNumber)) {
        markError("mobileNumber");
        return "Mobile number must start with 05 and contain 10 digits.";
      }

      // ID rule
      if (/^[12]/.test(data.idNumber)) {
        if (!/^[12]\d{9}$/.test(data.idNumber)) {
          markError("idNumber");
          return "ID number starting with 1 or 2 must be exactly 10 digits.";
        }
      }

      return "";
    }

    function printInvoice(data) {
  const printWindow = window.open("", "_blank", "width=800,height=700");

  if (!printWindow) {
    throw new Error("Popup blocked");
  }

  const html = `
  <html>
  <head>
    <title>Invoice</title>
    <style>
      body{
        font-family: Arial, sans-serif;
        padding:40px;
        color:#111827;
      }
      h1{
        text-align:center;
        margin-bottom:30px;
      }
      .box{
        border:1px solid #d1d5db;
        border-radius:12px;
        padding:24px;
      }
      .row{
        display:flex;
        justify-content:space-between;
        padding:10px 0;
        border-bottom:1px solid #e5e7eb;
      }
      .row:last-child{
        border-bottom:none;
      }
      .label{
        font-weight:700;
      }
    </style>
  </head>
  <body>
    <h1>Invoice</h1>
    <div class="box">
      <div class="row"><div class="label">Patient Name</div><div>${data.patientName}</div></div>
      <div class="row"><div class="label">Gender</div><div>${data.gender}</div></div>
      <div class="row"><div class="label">Nationality</div><div>${data.nationality}</div></div>
      <div class="row"><div class="label">Doctor Name</div><div>${data.doctorName}</div></div>
      <div class="row"><div class="label">Payment Type</div><div>${data.paymentType}</div></div>
      <div class="row"><div class="label">Payment Method</div><div>${data.paymentMethod}</div></div>
      <div class="row"><div class="label">Amount</div><div>${data.amount}</div></div>
    </div>
    <script>
      window.onload = function() {
        window.print();
      }
    <\/script>
  </body>
  </html>
  `;

  printWindow.document.open();
  printWindow.document.write(html);
  printWindow.document.close();
}
function printLastInvoice() {
  if (!lastInvoiceData) return;
  printInvoice(lastInvoiceData);
}
    async function submitForm() {
      const msg = document.getElementById("msg");
      const saveBtn = document.getElementById("saveBtn");

      const data = {
  patientName: document.getElementById("patientName").value.trim(),
  gender: document.getElementById("gender").value,
  age: document.getElementById("age").value.trim(),
  idNumber: document.getElementById("idNumber").value.trim(),
  mobileNumber: document.getElementById("mobileNumber").value.trim(),
  paymentType: document.getElementById("paymentType").value,
  paymentMethod: document.getElementById("paymentMethod").value,
  amount: document.getElementById("amount").value.trim(),
  nationality: document.getElementById("nationality").value,
  doctorName: document.getElementById("doctorName").value,
  status: "Reception",
receptionist: userName || ""};

      const validationMessage = validateForm(data);
      if (validationMessage) {
        msg.style.color = "red";
        msg.textContent = validationMessage;
        return;
      }

      try {
        saveBtn.disabled = true;
        saveBtn.textContent = "Saving...";
        msg.style.color = "#374151";
        msg.textContent = "Saving...";

        const res = await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify(data)
        });

        const result = await res.json();

       if (result.result === "success") {
  msg.style.color = "green";
  msg.textContent = "Patient saved successfully.";

  lastInvoiceData = data;

  document.getElementById("patientName").value = "";
  document.getElementById("gender").value = "";
  document.getElementById("age").value = "";
  document.getElementById("idNumber").value = "";
  document.getElementById("mobileNumber").value = "";
  document.getElementById("paymentType").value = "";
  document.getElementById("paymentMethod").value = "";
  document.getElementById("amount").value = "";
  document.getElementById("nationality").value = "";
  document.getElementById("doctorName").value = "";

  openPrintModal();
} else {
  msg.style.color = "red";
  msg.textContent = "Failed to save data.";
}
      } catch (error) {
        console.error(error);
        msg.style.color = "red";
        msg.textContent = "Connection error.";
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "Save Patient";
      }
    }

    function openPrintModal() {
  document.getElementById("printModal").style.display = "flex";
}

function closePrintModal() {
  document.getElementById("printModal").style.display = "none";
}

function confirmPrint() {
  closePrintModal();
  if (lastInvoiceData) {
    printInvoice(lastInvoiceData);
  }
}
  </script>

<div id="printModal" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
  z-index:999;
">
  <div style="
    background:white;
    padding:30px;
    border-radius:12px;
    width:320px;
    text-align:center;
  ">
    <h3 style="margin-bottom:20px;">Print Invoice?</h3>

    <button onclick="confirmPrint()" style="
      background:#7AB2B2;
      color:white;
      border:none;
      padding:10px 20px;
      border-radius:6px;
      margin-right:10px;
      cursor:pointer;
    ">Print</button>

    <button onclick="closePrintModal()" style="
      background:#ccc;
      border:none;
      padding:10px 20px;
      border-radius:6px;
      cursor:pointer;
    ">Cancel</button>
  </div>
</div>

</body>
</html>
