<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body{
      font-family:Segoe UI, Arial, sans-serif;
      background:#f4f7fb;
      margin:0;
      padding:30px;
    }

    .container{
      max-width:420px;
      margin:80px auto;
      background:#fff;
      padding:30px;
      border-radius:16px;
      box-shadow:0 8px 25px rgba(0,0,0,0.08);
    }

    h2{
      margin-top:0;
      text-align:center;
      color:#1f2937;
      font-size:30px;
    }

    label{
      display:block;
      margin:12px 0 8px;
      font-weight:600;
      color:#374151;
    }

    input{
      width:100%;
      padding:14px;
      border:1px solid #d1d5db;
      border-radius:12px;
      box-sizing:border-box;
      font-size:16px;
    }

    button{
      width:100%;
      margin-top:20px;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#7AB2B2;
      color:#fff;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
    }

    .msg{
      margin-top:14px;
      text-align:center;
      font-weight:600;
      min-height:24px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Login</h2>

  <label>Username</label>
  <input type="text" id="username">

  <label>Password</label>
  <input type="password" id="password">

  <button id="loginBtn" onclick="login()">Login</button>
  <div class="msg" id="msg"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzkvYNe-y6Ir5Ncfldk5mdtj9ealfZXae9rJPAIHbBeX5J94XsKBaNME31I_peXgXjzeQ/exec";

async function login(){
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");
  const btn = document.getElementById("loginBtn");

  if(!username || !password){
    msg.style.color = "red";
    msg.textContent = "Enter username and password";
    return;
  }

  try{
    btn.disabled = true;
    btn.innerText = "Logging in...";
    msg.style.color = "#374151";
    msg.textContent = "Checking...";

    const res = await fetch(URL, {
      method: "POST",
      body: JSON.stringify({
        action: "login",
        username: username,
        password: password
      })
    });

    const result = await res.json();

    if(result.result === "success"){
      localStorage.setItem("userRole", result.role);
      localStorage.setItem("userName", result.name);
      localStorage.setItem("username", username);

      if(result.role === "doctor"){
        window.location.href = "doctor.html";
      } else if(result.role === "reception"){
        window.location.href = "reception.html";
      } else if(result.role === "triage"){
        window.location.href = "triage.html";
      } else {
        msg.style.color = "red";
        msg.textContent = "Invalid role in Sheet2";
      }

    } else {
      msg.style.color = "red";
      msg.textContent = result.message || "Login failed";
    }

  } catch(error){
    console.error(error);
    msg.style.color = "red";
    msg.textContent = "Connection error";
  } finally {
    btn.disabled = false;
    btn.innerText = "Login";
  }
}
</script>

</body>
</html>
