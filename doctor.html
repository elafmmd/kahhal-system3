<!DOCTYPE html>
<html>
<head>
  <title>Doctor OP List</title>
  <style>
    body{
      font-family:Segoe UI, Arial, sans-serif;
      background:#f4f7fb;
      padding:20px;
      margin:0;
    }

    .container{
      background:white;
      border-radius:16px;
      box-shadow:0 8px 25px rgba(0,0,0,0.08);
      padding:20px;
      margin-bottom:20px;
    }

    h2{
      margin-top:0;
      color:#1f2937;
      font-size:28px;
    }

    .top-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
      border-radius:14px;
    }

    th, td{
      padding:14px;
      text-align:left;
      vertical-align:middle;
    }

    th{
      background:#7AB2B2;
      color:white;
      font-size:16px;
      white-space:nowrap;
    }

    tr:nth-child(even){
      background:#fafafa;
    }

    button{
      padding:10px 16px;
      background:#7AB2B2;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
    }

    button:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    .plan-box{
      width:100%;
      min-height:44px;
      padding:10px;
      border:1px solid #d1d5db;
      border-radius:8px;
      resize:vertical;
      transition:all .2s ease;
      box-sizing:border-box;
      line-height:1.5;
      overflow:hidden;
    }

    .plan-box:focus{
      min-height:110px;
      background:#f9fafb;
    }

    .history-cell{
      white-space:normal;
      word-break:break-word;
      overflow-wrap:anywhere;
      max-width:320px;
      line-height:1.5;
    }

    .active-tab{
      background:#1f2937 !important;
    }

    .muted{
      color:#6b7280;
      font-weight:600;
      padding:18px 0;
    }
  </style>
</head>
<body>

<div class="top-actions">
  <button onclick="logout()">Logout</button>
  <button id="btnCurrent" class="active-tab" onclick="setViewMode('current')">Current Patients</button>
  <button id="btnCompleted" onclick="setViewMode('completed')">Completed Patients</button>
</div>

<div class="container">
  <h2>Doctor Out Patient List</h2>
  <p id="doctorTitle" style="font-weight:700; color:#374151; margin-top:-10px;"></p>

  <table>
    <thead>
      <tr>
  <th>Name</th>
  <th>Gender</th>
  <th>ID Number</th>
  <th>Nationality</th>
  <th>Age</th>
  <th>Payment Type</th>
  <th>VA</th>
  <th>Complaint / History</th>
  <th>Management Plan</th>
  <th>Action</th>
</tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const userRole = localStorage.getItem("userRole");
const doctorName = localStorage.getItem("userName");
const URL = "https://script.google.com/macros/s/AKfycbzkvYNe-y6Ir5Ncfldk5mdtj9ealfZXae9rJPAIHbBeX5J94XsKBaNME31I_peXgXjzeQ/exec";
let allPatients = [];
let viewMode = "current";
function isToday(dateString){
  const today = new Date();
  const d = new Date(dateString);

  return d.getDate() === today.getDate() &&
         d.getMonth() === today.getMonth() &&
         d.getFullYear() === today.getFullYear();
}
if (userRole !== "doctor" || !doctorName) {
  window.location.href = "login.html";
}

document.getElementById("doctorTitle").innerText = "Doctor: " + doctorName;

function setViewMode(mode){
  viewMode = mode;

  document.getElementById("btnCurrent").classList.toggle("active-tab", mode === "current");
  document.getElementById("btnCompleted").classList.toggle("active-tab", mode === "completed");

  loadPatients(false);
}

async function loadPatients(forceReload = false){
  try{
    if (forceReload || allPatients.length === 0) {
      const res = await fetch(URL + "?t=" + Date.now());
      allPatients = await res.json();
    }

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    const targetStatus = viewMode === "current" ? "Triage Done" : "Doctor Done";

    const filtered = data.filter(p =>
  String(p["Status"] || "").trim() === "Triage Done" &&
  String(p["Doctor Name"] || "").trim() === doctorName &&
  isToday(p["Timestamp"])
);

    if (!filtered.length) {
tbody.innerHTML = `<tr><td colspan="9" class="muted">No patients found.</td></tr>`;
      return;
    }

    filtered.forEach(p => {
      const tr = document.createElement("tr");

      if (viewMode === "current") {
        tr.innerHTML = `
  <td>${p["Patient Name"] || ""}</td>
  <td>${p["Gender"] || ""}</td>
  <td>${p["ID Number"] || ""}</td>
  <td>${p["Nationality"] || ""}</td>
  <td>${p["Age"] || ""}</td>
  <td>${p["Payment Type"] || ""}</td>
  <td>${p["VA"] || ""}</td>
  <td class="history-cell">${p["AR"] || ""}</td>
  <td>
    <textarea id="plan-${p.rowIndex}" class="plan-box">${p["Management Plan"] || ""}</textarea>
  </td>
  <td>
    <button id="btn-${p.rowIndex}" onclick="saveDoctor(${p.rowIndex})">Save</button>
  </td>
`;
      } else {
        tr.innerHTML = `
  <td>${p["Patient Name"] || ""}</td>
  <td>${p["Gender"] || ""}</td>
  <td>${p["Nationality"] || ""}</td>
  <td>${p["Age"] || ""}</td>
  <td>${p["Payment Type"] || ""}</td>
  <td>${p["VA"] || ""}</td>
  <td class="history-cell">${p["AR"] || ""}</td>
  <td class="history-cell">${p["Management Plan"] || ""}</td>
  <td>
    <button id="reopen-${p.rowIndex}" onclick="reopenDoctor(${p.rowIndex})">Reopen</button>
  </td>
`;
      }

      tbody.appendChild(tr);
    });

  } catch(error){
    console.error(error);
    alert("Failed to load doctor list");
  }
}

document.addEventListener("input", function(e){
  if(e.target.classList.contains("plan-box")){
    e.target.style.height = "auto";
    e.target.style.height = e.target.scrollHeight + "px";
  }
});

async function saveDoctor(rowIndex){
  try{
    const btn = document.getElementById(`btn-${rowIndex}`);
    const plan = document.getElementById(`plan-${rowIndex}`).value;

    btn.innerText = "Saving...";
    btn.disabled = true;
    btn.style.background = "#9ca3af";

    const res = await fetch(URL, {
      method:"POST",
      body: JSON.stringify({
        action:"doctor_update",
        rowIndex: rowIndex,
        managementPlan: plan
      })
    });

    const result = await res.json();

    if(result.result === "doctor_updated"){
      btn.innerText = "Saved ✓";
      btn.style.background = "#16a34a";

      setTimeout(() => {
        loadPatients(true);
      }, 500);
    } else {
      throw new Error(result.message || "Unknown error");
    }

  } catch(error){
    console.error(error);

    const btn = document.getElementById(`btn-${rowIndex}`);
    btn.innerText = "Error";
    btn.style.background = "#dc2626";
    btn.disabled = false;
  }
}

async function reopenDoctor(rowIndex){
  try{
    const btn = document.getElementById(`reopen-${rowIndex}`);

    btn.innerText = "Reopening...";
    btn.disabled = true;
    btn.style.background = "#9ca3af";

    const res = await fetch(URL, {
      method:"POST",
      body: JSON.stringify({
        action:"doctor_reopen",
        rowIndex: rowIndex
      })
    });

    const result = await res.json();

    if(result.result === "reopened"){
      btn.innerText = "Reopened ✓";
      btn.style.background = "#16a34a";

      setTimeout(() => {
        loadPatients(true);
      }, 500);
    } else {
      throw new Error(result.message || "Unknown error");
    }

  } catch(error){
    console.error(error);

    const btn = document.getElementById(`reopen-${rowIndex}`);
    btn.innerText = "Error";
    btn.style.background = "#dc2626";
    btn.disabled = false;
  }
}

function logout() {
  localStorage.removeItem("userRole");
  localStorage.removeItem("userName");
  localStorage.removeItem("username");
  window.location.href = "login.html";
}

loadPatients();
</script>

</body>
</html>
