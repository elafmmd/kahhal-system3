<!DOCTYPE html>
<html>
<head>
  <title>Doctor OP List</title>
  <style>
    body{
      font-family:Segoe UI, Arial, sans-serif;
      background:#f4f7fb;
      padding:20px;
      margin:0;
    }

    .container{
      background:white;
      border-radius:16px;
      box-shadow:0 8px 25px rgba(0,0,0,0.08);
      padding:20px;
    }

    h2{
      margin-top:0;
      color:#1f2937;
      font-size:28px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
      border-radius:14px;
    }

    th, td{
      padding:14px;
      text-align:left;
      vertical-align:middle;
    }

    th{
      background:#7AB2B2;
      color:white;
      font-size:16px;
    }

    tr:nth-child(even){
      background:#fafafa;
    }

    input[type="text"]{
      width:100%;
      padding:10px;
      border:1px solid #d1d5db;
      border-radius:8px;
      box-sizing:border-box;
    }

    button{
      padding:10px 16px;
      background:#7AB2B2;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
    }

    button:disabled{
      opacity:.7;
      cursor:not-allowed;
    }
  </style>
</head>
<body>
<button onclick="logout()" style="width:auto; padding:10px 18px; margin-bottom:16px;">Logout</button>
<div class="container">
  <h2>Doctor Out Patient List</h2>
<p id="doctorTitle" style="font-weight:700; color:#374151; margin-top:-10px;"></p>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Gender</th>
        <th>Nationality</th>
        <th>Age</th>
        <th>Payment Type</th>
        <th>VA</th>
        <th>AR</th>
        <th>Management Plan</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
    const userRole = localStorage.getItem("userRole");
const doctorName = localStorage.getItem("userName");
const URL = "https://script.google.com/macros/s/AKfycbxtkrTGqSjtMT4OhHqAg5LPu9CypFdHT8Jg2pLt6UXnkIn722KtZ83P4hQp1-Hcpik9lw/exec";

if (userRole !== "doctor" || !doctorName) {
  window.location.href = "login.html";
}

document.getElementById("doctorTitle").innerText = "Doctor: " + doctorName;
async function loadPatients(){
  try{
    const res = await fetch(URL + "?t=" + Date.now());
    const data = await res.json();

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    const filtered = data.filter(p =>
  String(p["Status"] || "").trim() === "Triage Done" &&
  String(p["Doctor Name"] || "").trim() === String(doctorName || "").trim()
);

    filtered.forEach(p => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${p["Patient Name"] || ""}</td>
        <td>${p["Gender"] || ""}</td>
        <td>${p["Nationality"] || ""}</td>
        <td>${p["Age"] || ""}</td>
        <td>${p["Payment Type"] || ""}</td>
        <td>${p["VA"] || ""}</td>
        <td>${p["AR"] || ""}</td>
        <td><input type="text" id="plan-${p.rowIndex}" value="${p["Management Plan"] || ""}"></td>
        <td><button id="btn-${p.rowIndex}" onclick="saveDoctor(${p.rowIndex})">Save</button></td>
      `;

      tbody.appendChild(tr);
    });

  } catch(error){
    console.error(error);
    alert("Failed to load doctor list");
  }
}

async function saveDoctor(rowIndex){
  try{
    const btn = document.getElementById(`btn-${rowIndex}`);
    const plan = document.getElementById(`plan-${rowIndex}`).value;

    btn.innerText = "Saving...";
    btn.disabled = true;
    btn.style.background = "#9ca3af";

    const res = await fetch(URL, {
      method:"POST",
      body: JSON.stringify({
        action:"doctor_update",
        rowIndex: rowIndex,
        managementPlan: plan
      })
    });

    const result = await res.json();

    if(result.result === "doctor_updated"){
      btn.innerText = "Saved ✓";
      btn.style.background = "#16a34a";

      setTimeout(() => {
        loadPatients();
      }, 500);
    } else {
      throw new Error(result.message || "Unknown error");
    }

  } catch(error){
    console.error(error);

    const btn = document.getElementById(`btn-${rowIndex}`);
    btn.innerText = "Error";
    btn.style.background = "#dc2626";
    btn.disabled = false;
  }
}
function logout() {
  localStorage.removeItem("userRole");
  localStorage.removeItem("userName");
  localStorage.removeItem("username");
  window.location.href = "login.html";
}
loadPatients();
</script>

</body>
</html>
